services:
  - type: web
    name: carousel-automator-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # Render injects its own PORT — do NOT hardcode it (the code reads process.env.PORT).
      - key: GROQ_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_USER_ID
        sync: false
      # Auto-posting: ON in the cloud, twice daily at peak hours (US Eastern).
      - key: AUTO_START
        value: "true"
      - key: SCHEDULE_TZ
        value: America/New_York
      - key: DEFAULT_CRON
        value: "0 12,19 * * *"
